---
name: 🧹 Lint
"on":
  workflow_call:
    secrets:
      REPOMATIC_PAT:
        required: false
      VIRUSTOTAL_API_KEY:
        required: false
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches-ignore:
      # Skip on automated version-bump PRs: their content is identical to main
      # (only version strings and uv.lock change), so the lint matrix would burn
      # CI minutes for no signal.
      - major-version-increment
      - minor-version-increment
      - prepare-release
      - renovate/**

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.event.head_commit.message, '[changelog] Release') }}

jobs:

  metadata:
    name: 🧬 Project metadata
    runs-on: ubuntu-slim
    outputs:
      metadata: ${{ steps.metadata.outputs.metadata }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
      - name: Run repomatic metadata
        # is_version_bump_branch lets every dependent job below skip uniformly
        # for prepare-release and *-version-increment PRs (including downstream
        # workflow_call invocations that bypass branches-ignore filters).
        id: metadata
        run: >
          uvx --no-progress --from . repomatic metadata
          --format github-json --output "$GITHUB_OUTPUT"
          is_bot is_version_bump_branch python_files yaml_files
          workflow_files zsh_files is_python_project

  lint-repo:
    name: 🏠 Lint repo
    needs:
      - metadata
    if: ${{ !fromJSON(needs.metadata.outputs.metadata).is_version_bump_branch }}
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
      - name: Lint repository metadata
        env:
          GH_TOKEN: ${{ secrets.REPOMATIC_PAT || github.token }}
          REPOMATIC_PAT: ${{ secrets.REPOMATIC_PAT }}
          HAS_VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY && 'true' || '' }}
        run: uvx --no-progress --from . repomatic lint-repo

  lint-types:
    name: 🛡️ Lint types
    needs:
      - metadata
    # Skip on version-bump PRs (frozen URLs, no code change) and when no
    # Python files are present.
    if: >
      !fromJSON(needs.metadata.outputs.metadata).is_version_bump_branch
      && fromJSON(needs.metadata.outputs.metadata).python_files
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
      - name: Install all package dependencies
        # --all-extras and --all-groups are required as Mypy will check all Python files of the project, including
        # those related to optional features, tests, development and documentation.
        # Skip for non-Python projects (no pyproject.toml/uv.lock) where mypy can still lint standalone scripts.
        if: fromJSON(needs.metadata.outputs.metadata).is_python_project
        run: uv --no-progress sync --frozen --all-extras --all-groups
      - name: Run Mypy
        env:
          PYTHON_FILES: ${{ fromJSON(needs.metadata.outputs.metadata).python_files }}
        run: echo "${PYTHON_FILES}" | xargs uvx --no-progress --from . repomatic run mypy --

  lint-yaml:
    name: 📄 Lint YAML
    needs:
      - metadata
    # Skip on version-bump PRs (frozen URLs, no code change) and dependency
    # update PRs (do not heavily alter YAML files).
    if: >
      !fromJSON(needs.metadata.outputs.metadata).is_version_bump_branch
      && (! fromJSON(needs.metadata.outputs.metadata).is_bot)
      && fromJSON(needs.metadata.outputs.metadata).yaml_files
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
      - name: Run yamllint
        run: uvx --no-progress --from . repomatic run yamllint -- .

  lint-zsh:
    name: 🐚 Lint Zsh
    needs:
      - metadata
    # Skip on version-bump PRs and bot PRs (neither alters Zsh files).
    if: >
      !fromJSON(needs.metadata.outputs.metadata).is_version_bump_branch
      && (! fromJSON(needs.metadata.outputs.metadata).is_bot)
      && fromJSON(needs.metadata.outputs.metadata).zsh_files
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Zsh
        run: |
          sudo apt update
          sudo apt install --yes zsh
      - name: Lint
        env:
          ZSH_FILES: ${{ fromJSON(needs.metadata.outputs.metadata).zsh_files }}
        run: echo "${ZSH_FILES}" | xargs -n1 zsh --no-exec

  lint-github-actions:
    name: ⚡ Lint GitHub Actions
    needs:
      - metadata
    # Skip on version-bump PRs and dependency update PRs (neither heavily
    # alters GitHub Actions).
    if: >
      !fromJSON(needs.metadata.outputs.metadata).is_version_bump_branch
      && (! fromJSON(needs.metadata.outputs.metadata).is_bot)
      && fromJSON(needs.metadata.outputs.metadata).workflow_files
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/repomatic/bin
          key: repomatic-bin-${{ runner.os }}-${{ runner.arch }}-actionlint-${{ hashFiles('repomatic/tool_runner.py') }}
          restore-keys: |
            repomatic-bin-${{ runner.os }}-${{ runner.arch }}-actionlint-
      - name: Install shellcheck
        run: sudo apt update && sudo apt install --yes shellcheck
      - name: Setup problem matcher
        # Source: https://github.com/rhysd/actionlint/blob/main/docs/usage.md#problem-matchers
        run: |
          curl -fsSL --output ./.github/actionlint-matcher.json \
            https://raw.githubusercontent.com/rhysd/actionlint/refs/tags/v1.7.12/.github/actionlint-matcher.json
          echo "::add-matcher::.github/actionlint-matcher.json"
      - name: Run actionlint
        run: uvx --no-progress --from . repomatic run actionlint

  lint-workflow-security:
    name: 🔒 Lint workflow security
    needs:
      - metadata
    # Skip on version-bump PRs and dependency update PRs (neither heavily
    # alters GitHub Actions).
    if: >
      !fromJSON(needs.metadata.outputs.metadata).is_version_bump_branch
      && (! fromJSON(needs.metadata.outputs.metadata).is_bot)
      && fromJSON(needs.metadata.outputs.metadata).workflow_files
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
      - name: Run zizmor
        run: uvx --no-progress --from . repomatic run zizmor -- .

  lint-awesome:
    name: 🌟 Lint awesome
    needs:
      - metadata
    # Skip on version-bump PRs to align with the rest of the workflow, even
    # though "awesome-*" repositories don't trigger the release workflow.
    if: >
      startsWith(github.event.repository.name, 'awesome-')
      && !fromJSON(needs.metadata.outputs.metadata).is_version_bump_branch
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Fetch all history to please linter's age checks.
          fetch-depth: 0
      - name: Install awesome-lint
        run: |
          npm install awesome-lint@2.3.0
          npx awesome-lint --version
      - name: Run awesome-lint
        run: npx awesome-lint

  lint-secrets:
    name: 🔐 Lint secrets
    needs:
      - metadata
    # Skip on version-bump PRs and dependency update PRs.
    if: >
      !fromJSON(needs.metadata.outputs.metadata).is_version_bump_branch
      && ! fromJSON(needs.metadata.outputs.metadata).is_bot
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/repomatic/bin
          key: repomatic-bin-${{ runner.os }}-${{ runner.arch }}-gitleaks-${{ hashFiles('repomatic/tool_runner.py') }}
          restore-keys: |
            repomatic-bin-${{ runner.os }}-${{ runner.arch }}-gitleaks-
      - name: Run gitleaks
        run: uvx --no-progress --from . repomatic run gitleaks -- detect --source .
